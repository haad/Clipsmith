name: Build and Release (Unsigned - DISABLED)

# Disabled: use release-signed.yml instead, which handles both signed and unsigned paths.
# on:
#   push:
#     tags:
#       - 'v*'
#   workflow_dispatch:
on: workflow_dispatch


permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Verify System Tools
      run: |
        echo "=== System Information ==="
        sw_vers
        echo ""
        echo "=== Checking for hdiutil ==="
        which hdiutil || echo "hdiutil not found in PATH"
        hdiutil --version || echo "hdiutil command failed"
        echo ""
        echo "=== Checking for other DMG tools ==="
        which create-dmg || echo "create-dmg not found"
        echo ""
        echo "=== Current PATH ==="
        echo $PATH
        echo ""
        echo "=== Available disk utilities ==="
        ls -la /usr/bin/*disk* || true
        ls -la /usr/bin/hdiutil || true

    - name: Extract version from tag
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}  # Remove 'v' prefix if present
        else
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        echo "GITHUB_REF: $GITHUB_REF"

    - name: List available schemes
      run: xcodebuild -list -project Clipsmith.xcodeproj

    - name: Build and Archive
      run: |
        xcodebuild \
          -project Clipsmith.xcodeproj \
          -scheme Clipsmith \
          -configuration Release \
          -archivePath build/Clipsmith.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Export App
      run: |
        # Create export options
        cat > build/ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>mac-application</string>
            <key>signingStyle</key>
            <string>manual</string>
        </dict>
        </plist>
        EOF

        # Export the app
        xcodebuild \
          -exportArchive \
          -archivePath build/Clipsmith.xcarchive \
          -exportPath build/Export \
          -exportOptionsPlist build/ExportOptions.plist

    - name: Ad-hoc Code Sign
      run: |
        APP_PATH=$(find build -name "Clipsmith.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: Could not find Clipsmith.app for signing"
          exit 1
        fi
        echo "Ad-hoc signing: $APP_PATH"
        codesign --force --deep --sign - \
          --entitlements Clipsmith/Clipsmith.entitlements \
          "$APP_PATH"
        echo "Verifying signature..."
        codesign --verify --deep --strict "$APP_PATH"
        codesign -dvvv "$APP_PATH" 2>&1 | head -10

    - name: Verify Export
      run: |
        echo "Checking build directory structure:"
        ls -la build/
        echo ""
        echo "Checking archive contents:"
        ls -la build/Clipsmith.xcarchive/ || true
        ls -la build/Clipsmith.xcarchive/Products/ || true
        ls -la build/Clipsmith.xcarchive/Products/Applications/ || true
        echo ""
        echo "Checking export directory:"
        ls -la build/Export/ || true
        echo ""
        echo "Looking for .app bundles:"
        find build -name "*.app" -type d

    - name: Create DMG
      run: |
        # Ensure build directory exists first
        mkdir -p build

        # Verify hdiutil is available
        if ! command -v hdiutil &> /dev/null; then
          echo "Warning: hdiutil command not found in PATH"
          echo "Installing create-dmg as alternative..."
          brew install create-dmg
        else
          echo "hdiutil is available at: $(which hdiutil)"
          hdiutil help create 2>&1 | head -5 || true
        fi

        # Find the app bundle
        APP_PATH=$(find build -name "Clipsmith.app" -type d | head -1)

        if [ -z "$APP_PATH" ]; then
          echo "Error: Could not find Clipsmith.app"
          echo "Build directory contents:"
          find build -type d
          exit 1
        fi

        echo "Found app at: $APP_PATH"

        # Create a staging directory for DMG contents
        mkdir -p build/dmg-staging

        # Copy the app to staging
        echo "Copying app to staging directory..."
        cp -R "$APP_PATH" build/dmg-staging/

        # Verify copy
        if [ ! -d "build/dmg-staging/Clipsmith.app" ]; then
          echo "Error: Failed to copy app to staging directory"
          ls -la build/dmg-staging/
          exit 1
        fi

        # Create a symbolic link to Applications folder
        ln -s /Applications build/dmg-staging/Applications

        # Verify staging directory contents before creating DMG
        echo "Staging directory contents:"
        ls -la build/dmg-staging/

        # Create the DMG
        DMG_NAME="Clipsmith.dmg"

        # Use absolute paths
        WORKSPACE_DIR="$(pwd)"
        SOURCE_DIR="${WORKSPACE_DIR}/build/dmg-staging"
        DMG_PATH="${WORKSPACE_DIR}/build/${DMG_NAME}"

        echo "Creating DMG: $DMG_NAME"
        echo "Working directory: $WORKSPACE_DIR"
        echo "Source folder: $SOURCE_DIR"
        echo "Destination: $DMG_PATH"

        # Verify source folder exists
        if [ ! -d "$SOURCE_DIR" ]; then
          echo "Error: Source folder $SOURCE_DIR does not exist"
          exit 1
        fi

        # Create DMG with absolute paths
        echo "Running hdiutil..."
        hdiutil create \
          -volname "Clipsmith" \
          -srcfolder "$SOURCE_DIR" \
          -ov \
          -format UDZO \
          "$DMG_PATH" || {
            echo "hdiutil failed with exit code $?"
            echo "Trying alternative approach with create-dmg..."
            brew install create-dmg
            create-dmg \
              --volname "Clipsmith" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --app-drop-link 600 185 \
              "$DMG_PATH" \
              "$SOURCE_DIR"
          }

        # Verify DMG was created
        if [ -f "$DMG_PATH" ]; then
          echo "DMG created successfully!"
          ls -lh "$DMG_PATH"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT
        else
          echo "Error: DMG file not found at $DMG_PATH"
          echo "Searching for DMG files..."
          find . -name "*.dmg" -type f
          exit 1
        fi
      id: create_dmg

    - name: Generate Release Notes from CHANGELOG.md
      id: release_notes
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"

        # Extract the section for this version from CHANGELOG.md
        if [ -f CHANGELOG.md ]; then
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)
        fi

        if [ -z "$NOTES" ]; then
          # Fallback to git log if version not in CHANGELOG.md
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" --reverse)
          fi
        fi

        cat > release_notes.md <<EOF
        ${NOTES}

        ## Installation

        1. Download the DMG file below
        2. Open the DMG and drag Clipsmith.app to Applications
        3. Launch Clipsmith — grant Accessibility permission when prompted

        **Requirements:** macOS 15 (Sequoia) or later

        **Free and open source.** [Sponsor on GitHub](https://github.com/sponsors/haad) to support development.
        EOF

        cat release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: build/Clipsmith.dmg
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

