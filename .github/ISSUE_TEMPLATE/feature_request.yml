name: Feature Request
description: Suggest a new feature or improvement for Clipsmith
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Clipsmith? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve, or what workflow does it improve?
      placeholder: I often find myself needing to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like it to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about or workarounds you currently use.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Clipboard History
        - Code Snippets
        - Prompt Library
        - Documentation Browser
        - Quick Actions
        - Keyboard Shortcuts
        - Settings / Preferences
        - Menu Bar
        - New Feature Area
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links to similar tools, etc.
