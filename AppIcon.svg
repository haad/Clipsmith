<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep navy to sky blue -->
    <linearGradient id="bgGrad" x1="512" y1="922" x2="512" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A3A5C"/>
      <stop offset="0.45" stop-color="#4A90D9"/>
      <stop offset="1" stop-color="#6BB3FF"/>
    </linearGradient>

    <!-- Subtle top highlight -->
    <linearGradient id="hlGrad" x1="512" y1="102" x2="512" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.2"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Squircle clip path -->
    <clipPath id="squircleClip">
      <rect x="102" y="102" width="820" height="820" rx="185" ry="185"/>
    </clipPath>

    <!-- Drop shadow for the icon body -->
    <filter id="iconShadow" x="-8%" y="-4%" width="116%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.38"/>
    </filter>

    <!-- Shadow for clipboard elements -->
    <filter id="elemShadow" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- === SQUIRCLE BACKGROUND === -->
  <rect x="102" y="102" width="820" height="820" rx="185" ry="185"
        fill="url(#bgGrad)" filter="url(#iconShadow)"/>

  <!-- Top highlight overlay (clipped to squircle) -->
  <rect x="102" y="102" width="820" height="460"
        fill="url(#hlGrad)" clip-path="url(#squircleClip)"/>

  <!-- Subtle inner border -->
  <rect x="103" y="103" width="818" height="818" rx="184" ry="184"
        fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- === CLIPBOARD + DOCUMENT === -->
  <g filter="url(#elemShadow)">

    <!-- BACK: Clipboard board -->
    <rect x="310" y="300" width="330" height="440" rx="26"
          fill="white" fill-opacity="0.60"/>

    <!-- Binder clip base (sits on top edge of clipboard) -->
    <rect x="425" y="270" width="110" height="56" rx="14"
          fill="white" fill-opacity="0.60"/>
    <!-- Clip inner hole -->
    <rect x="450" y="282" width="60" height="26" rx="9"
          fill="#1A3A5C" fill-opacity="0.40"/>

    <!-- FRONT: Document page -->
    <g>
      <!-- Document body with folded corner -->
      <path d="
        M 415 362
        L 665 362
        Q 685 362, 685 382
        L 685 732
        Q 685 752, 665 752
        L 415 752
        Q 395 752, 395 732
        L 395 382
        Q 395 362, 415 362
        Z"
        fill="white" fill-opacity="0.95"/>

      <!-- Text lines on document -->
      <rect x="435" y="420" width="210" height="15" rx="7.5"
            fill="#1A3A5C" fill-opacity="0.25"/>
      <rect x="435" y="468" width="210" height="15" rx="7.5"
            fill="#1A3A5C" fill-opacity="0.25"/>
      <rect x="435" y="516" width="210" height="15" rx="7.5"
            fill="#1A3A5C" fill-opacity="0.25"/>
      <rect x="435" y="564" width="155" height="15" rx="7.5"
            fill="#1A3A5C" fill-opacity="0.25"/>
    </g>

  </g>
</svg>
